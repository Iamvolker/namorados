<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Dia dos Namorados 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      background: radial-gradient(ellipse at center, #1a0010 0%, #0d0008 60%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Dancing Script', cursive;
    }

    /* ── Partículas ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 182, 193, 0.4);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Layout principal ── */
    .scene {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      /* ocupa a janela inteira com padding seguro */
      width: 100vw;
      height: 100dvh;
      padding: env(safe-area-inset-top, 12px)
               env(safe-area-inset-right, 12px)
               env(safe-area-inset-bottom, 12px)
               env(safe-area-inset-left, 12px);
    }

    .title {
      color: #ffb6c1;
      font-size: clamp(1.1rem, 3.5vmin, 2.4rem);
      letter-spacing: 0.12em;
      text-shadow:
        0 0 10px rgba(255,105,135,.8),
        0 0 30px rgba(255,105,135,.4),
        0 0 60px rgba(255,105,135,.2);
      text-align: center;
      flex-shrink: 0;
      margin-bottom: clamp(8px, 2vmin, 24px);
    }

    /* Canvas wrapper: quadrado que se adapta ao menor lado disponível */
    .heart-wrap {
      position: relative;
      flex-shrink: 0;
      /* tamanho calculado via JS, mas deixamos um valor inicial */
      width: min(80vw, 80vh, 480px);
      height: min(80vw, 80vh, 480px);
    }

    #heartCanvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    .center-heart {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 7vmin, 3.5rem);
      animation: pulse 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255,100,130,.9));
      pointer-events: none;
      z-index: 2;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.18); }
    }

    .footer {
      color: rgba(255,182,193,.55);
      font-size: clamp(0.75rem, 2.2vmin, 1rem);
      letter-spacing: 0.1em;
      text-align: center;
      flex-shrink: 0;
      margin-top: clamp(8px, 2vmin, 24px);
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="scene">
    <h1 class="title">✦ Happy Valentine's Day ✦</h1>

    <div class="heart-wrap" id="heartWrap">
      <canvas id="heartCanvas"></canvas>
      <div class="center-heart">💗</div>
    </div>

    <p class="footer">com amor, para sempre ♡</p>
  </div>

  <script>
    /* ── PARTÍCULAS ── */
    const pc = document.getElementById('particles');
    for (let i = 0; i < 55; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const sz = 2 + Math.random() * 4;
      p.style.cssText = `
        left:${Math.random()*100}%;
        width:${sz}px; height:${sz}px;
        animation-duration:${6+Math.random()*12}s;
        animation-delay:${-Math.random()*15}s;
        opacity:${0.2+Math.random()*0.5};
      `;
      pc.appendChild(p);
    }

    /* ── CANVAS RESPONSIVO ── */
    const wrap   = document.getElementById('heartWrap');
    const canvas = document.getElementById('heartCanvas');
    const ctx    = canvas.getContext('2d');

    const TEXT       = 'I Love You  ';
    const COPIES     = 14;
    const FULL_TEXT  = TEXT.repeat(COPIES);
    const N_PATH     = 600;
    const letterSpacing = 1.5;

    let W, H, CX, CY, SCALE;
    let pathPts = [], cumLen = [], totalLen = 0;
    let charWidths = [];
    let offset = 0;
    let rafId = null;

    /* Equação paramétrica do coração */
    function heartPoint(t, sc, cx, cy) {
      const x =  16 * Math.pow(Math.sin(t), 3);
      const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
      return { x: cx + x*sc, y: cy + y*sc };
    }

    function buildPath(sc, cx, cy) {
      const pts = [];
      for (let i = 0; i < N_PATH; i++) {
        pts.push(heartPoint((i/N_PATH)*2*Math.PI, sc, cx, cy));
      }
      return pts;
    }

    function buildCumLen(pts) {
      const cl = [0];
      for (let i = 1; i < pts.length; i++) {
        const dx = pts[i].x - pts[i-1].x;
        const dy = pts[i].y - pts[i-1].y;
        cl.push(cl[i-1] + Math.hypot(dx, dy));
      }
      return cl;
    }

    function getPointOnPath(d) {
      const dn = ((d % totalLen) + totalLen) % totalLen;
      let lo = 0, hi = N_PATH - 1;
      while (lo < hi - 1) {
        const mid = (lo + hi) >> 1;
        cumLen[mid] <= dn ? lo = mid : hi = mid;
      }
      const t  = (dn - cumLen[lo]) / (cumLen[hi] - cumLen[lo] || 1);
      return {
        x: pathPts[lo].x + t*(pathPts[hi].x - pathPts[lo].x),
        y: pathPts[lo].y + t*(pathPts[hi].y - pathPts[lo].y),
        angle: Math.atan2(pathPts[hi].y - pathPts[lo].y, pathPts[hi].x - pathPts[lo].x)
      };
    }

    function setup() {
      /* Calcula o maior quadrado que cabe na viewport com margem */
      const titleEl  = document.querySelector('.title');
      const footerEl = document.querySelector('.footer');
      const titleH   = titleEl.offsetHeight  + parseFloat(getComputedStyle(titleEl).marginBottom);
      const footerH  = footerEl.offsetHeight + parseFloat(getComputedStyle(footerEl).marginTop);
      const gap      = 8; // folga extra

      const availW = window.innerWidth  * 0.92;
      const availH = (window.innerHeight * 0.92) - titleH - footerH - gap * 2;
      const side   = Math.floor(Math.min(availW, availH, 520));

      wrap.style.width  = side + 'px';
      wrap.style.height = side + 'px';

      canvas.width  = side;
      canvas.height = side;
      W = H = side;
      CX = CY = side / 2;
      SCALE = side / 28.5;   // proporção que mantém o coração bem preenchido

      pathPts  = buildPath(SCALE, CX, CY);
      cumLen   = buildCumLen(pathPts);
      totalLen = cumLen[N_PATH - 1];

      const FONT_SIZE = Math.max(9, Math.round(side / 37));
      ctx.font = `bold ${FONT_SIZE}px "Dancing Script", cursive`;
      charWidths = [...FULL_TEXT].map(c => ctx.measureText(c).width);

      /* Guarda font size para o draw */
      canvas._fontSize = FONT_SIZE;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const FONT_SIZE = canvas._fontSize || 13;
      ctx.font = `bold ${FONT_SIZE}px "Dancing Script", cursive`;
      ctx.textBaseline = 'middle';

      let d = offset;
      for (let i = 0; i < FULL_TEXT.length; i++) {
        const ch = FULL_TEXT[i];
        const w  = charWidths[i] + letterSpacing;
        const pos = getPointOnPath(d + w / 2);

        ctx.save();
        ctx.translate(pos.x, pos.y);
        ctx.rotate(pos.angle);

        ctx.shadowColor   = 'rgba(180, 20, 60, 0.55)';
        ctx.shadowBlur    = 0;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 4;
        ctx.fillStyle     = 'rgba(255, 182, 200, 0.92)';

        ctx.shadowColor   = 'rgba(255, 100, 140, 0.6)';
        ctx.shadowBlur    = 7;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        ctx.fillText(ch, 0, 0);
        ctx.restore();

        d += w;
      }

      offset -= 0.28;
      if (offset < -totalLen) offset += totalLen;

      rafId = requestAnimationFrame(draw);
    }

    /* Re-setup ao redimensionar (inclui rotação portrait↔landscape) */
    let resizeTimer;
    function onResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (rafId) cancelAnimationFrame(rafId);
        setup();
        rafId = requestAnimationFrame(draw);
      }, 120);
    }

    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onResize);

    /* Aguarda fonte carregar antes do primeiro setup */
    document.fonts.ready.then(() => {
      setup();
      rafId = requestAnimationFrame(draw);
    });
  </script>
</body>
</html>
